name: Materialize Level 05 Q Lab

on:
  push:
    branches:
      - feature/level05-q-lab-art

permissions:
  contents: write

jobs:
  update-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/level05-q-lab-art
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wire Level 05 artwork and coordinates
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("scenarios/james-bond-level-05-content.json")
          data = json.loads(path.read_text())
          data["content_version"] = "2026-07-06-q-lab-art-1"
          data["assets"]["background"] = "assets/james-bond/level-05-q-lab/generated/q-lab-background.svg"
          data["assets"]["guide_spritesheet"] = "assets/james-bond/level-05-q-lab/generated/agent-q-spritesheet.svg"
          data["assets"]["interactive_props"] = "assets/james-bond/level-05-q-lab/generated/interactive-props.svg"
          data["presentation"]["guide_scale_multiplier"] = 1.72
          data["guide"]["position"] = {"x": 835, "y": 486}
          data["guide"]["walk_to"] = {"x": 790, "y": 480}
          data["navigation"]["walkable_polygon"] = [
              {"x": 18, "y": 338}, {"x": 1006, "y": 338},
              {"x": 1016, "y": 566}, {"x": 12, "y": 566}
          ]
          data["navigation"]["obstacles"] = [
              {"id": "gadget_table", "x1": 440, "y1": 315, "x2": 865, "y2": 438},
              {"id": "left_console", "x1": 0, "y1": 230, "x2": 165, "y2": 430}
          ]

          exit_marker = data["exit_marker"]
          exit_marker.update({
              "x": 950, "y": 286,
              "zone": {"width": 118, "height": 360},
              "walk_to": {"x": 875, "y": 462}
          })
          exit_marker.pop("scene_icon", None)

          for hotspot in data["hotspots"]:
              if hotspot["id"] == "briefing_board":
                  hotspot.update({"x": 294, "y": 205, "walk_to": {"x": 302, "y": 440}, "radius": 72})
                  hotspot.pop("scene_icon", None)
              elif hotspot["id"] == "gadget_watch":
                  hotspot.update({"x": 535, "y": 365, "walk_to": {"x": 535, "y": 458}, "radius": 34})
                  hotspot["inventory"]["icon"]["frame"] = {"x": 0, "y": 0, "width": 384, "height": 512}
              elif hotspot["id"] == "gadget_glasses":
                  hotspot.update({"x": 650, "y": 365, "walk_to": {"x": 650, "y": 458}, "radius": 34})
                  hotspot["inventory"]["icon"]["frame"] = {"x": 384, "y": 0, "width": 384, "height": 512}
              elif hotspot["id"] == "gadget_jacket":
                  hotspot.update({"x": 760, "y": 365, "walk_to": {"x": 760, "y": 458}, "radius": 38})
                  hotspot["inventory"]["icon"]["frame"] = {"x": 768, "y": 0, "width": 384, "height": 512}

          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n")
          PY
      - run: python -m pip install pillow
      - run: npm ci
      - name: Run full test suite
        run: npm test
        env:
          BROWSER_CHANNEL: chrome
      - name: Commit tested Level 05 integration
        run: |
          rm .github/workflows/materialize-level05-q-lab.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scenarios/james-bond-level-05-content.json .github/workflows/materialize-level05-q-lab.yml
          git commit -m "Wire Level 05 Q Lab artwork"
          git push origin HEAD:feature/level05-q-lab-art
