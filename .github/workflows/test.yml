name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pillow
      - run: npm ci
      - name: Validate game content
        run: npm run test:content
      - name: Validate puzzle graph and ECA engine
        run: npm run test:engine
      - name: Validate assets and JavaScript
        run: npm run test:assets
      - name: Run browser smoke test
        run: npm run test:browser
        env:
          BROWSER_CHANNEL: chrome
